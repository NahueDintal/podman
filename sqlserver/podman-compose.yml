version: '3.8'

services:
  sqlserver:
    image: sqlserver-with-tools          # Usa tu imagen personalizada
    container_name: sqlserver
    ports:
      - "1433:1433"
    env_file:
      - .env
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  sqlserver_data:
